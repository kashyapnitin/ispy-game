<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Spy Digital Game</title>
    <!-- Tailwind (CDN build) for layout/utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for vibrant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app" class="flex flex-col min-h-screen">
        <!-- Main Menu Screen -->
        <div id="main-menu" class="screen active flex items-center justify-center">
            <!-- Language Selector Header -->
            <header class="app-header">
                <select id="lang-select" class="lang-dropdown">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="hi">हिन्दी</option>
                    <option value="zh">中文</option>
                    <option value="pt-PT">Português</option>
                    <option value="pt-BR">Português (Brasil)</option>
                    <option value="fr">Français</option>
                    <option value="ja">日本語</option>
                    <option value="bn">বাংলা</option>
                    <option value="gu">ગુજરાતી</option>
                    <option value="mr">मराठी</option>
                    <option value="kn">ಕನ್ನಡ</option>
                    <option value="ta">தமிழ்</option>
                    <option value="ml">മലയാളം</option>
                    <option value="pa">ਪੰਜਾਬੀ</option>
                    <option value="sw">Kiswahili</option>
                    <option value="ms">Bahasa Melayu</option>
                    <option value="tl">Tagalog</option>
                </select>
            </header>

            <div
                class="menu-content w-full max-w-md sm:max-w-xl lg:max-w-3xl mx-2 sm:mx-6 px-2 sm:px-6 py-4 sm:py-8 rounded-3xl shadow bg-white text-center flex flex-col gap-3 sm:gap-4">
                <h1 data-i18n="title"
                    class="font-heading text-3xl sm:text-4xl lg:text-5xl text-[var(--primary-color)] drop-shadow">
                    I Spy...
                </h1>
                <p data-i18n="subtitle" class="text-sm sm:text-base lg:text-lg font-semibold text-gray-600">
                    Can you find all the hidden objects?
                </p>
                <div class="carousel-container flex items-center gap-2 w-full">
                    <button class="carousel-arrow hidden sm:flex" id="carousel-prev" aria-label="Previous">&larr;</button>
                    <!-- Mobile: 1-row carousel using same compact card style as old 2x3 grid -->
                    <div
                        class="scene-selection flex gap-3 overflow-x-auto scroll-smooth snap-x snap-mandatory py-2 px-0 sm:px-1"
                        id="scene-selection">
                        <button
                            class="scene-btn flex flex-col items-center bg-white border-[3px] border-[var(--secondary-color)] rounded-xl shadow flex-shrink-0 w-[38vw] sm:w-52 lg:w-64 snap-center p-1.5 sm:p-2"
                            data-scene="toyshop">
                            <img src="assets/images/scenes/toyshop/scene_toyshop.jpg" alt="Toy Shop Scene"
                                class="scene-thumb rounded-lg w-full aspect-square sm:aspect-[4/3] object-cover"
                                onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%23ccc\'/><text x=\'50\' y=\'50\' dominant-baseline=\'middle\' text-anchor=\'middle\'>Image Needed</text></svg>'">
                            <span data-i18n="sceneToyshop"
                                class="font-heading text-sm sm:text-sm lg:text-base mt-1 w-full text-center truncate">
                                Toy Shop
                            </span>
                        </button>
                        <button
                            class="scene-btn flex flex-col items-center bg-white border-[3px] border-[var(--secondary-color)] rounded-xl shadow flex-shrink-0 w-[38vw] sm:w-52 lg:w-64 snap-center p-1.5 sm:p-2"
                            data-scene="kitchen">
                            <img src="assets/images/scenes/kitchen/scene_kitchen.jpg" alt="Kitchen Scene"
                                class="scene-thumb rounded-lg w-full aspect-square sm:aspect-[4/3] object-cover">
                            <span data-i18n="sceneKitchen"
                                class="font-heading text-sm sm:text-sm lg:text-base mt-1 w-full text-center truncate">
                                Kitchen
                            </span>
                        </button>
                        <button
                            class="scene-btn flex flex-col items-center bg-white border-[3px] border-[var(--secondary-color)] rounded-xl shadow flex-shrink-0 w-[38vw] sm:w-52 lg:w-64 snap-center p-1.5 sm:p-2"
                            data-scene="playground">
                            <img src="assets/images/scenes/playground/scene_playground.jpg" alt="Playground Scene"
                                class="scene-thumb rounded-lg w-full aspect-square sm:aspect-[4/3] object-cover">
                            <span data-i18n="scenePlayground"
                                class="font-heading text-sm sm:text-sm lg:text-base mt-1 w-full text-center truncate">
                                Playground
                            </span>
                        </button>
                        <button
                            class="scene-btn flex flex-col items-center bg-white border-[3px] border-[var(--secondary-color)] rounded-xl shadow flex-shrink-0 w-[38vw] sm:w-52 lg:w-64 snap-center p-1.5 sm:p-2"
                            data-scene="beach">
                            <img src="assets/images/scenes/beach/scene_beach.jpg" alt="Beach Scene"
                                class="scene-thumb rounded-lg w-full aspect-square sm:aspect-[4/3] object-cover">
                            <span data-i18n="sceneBeach"
                                class="font-heading text-sm sm:text-sm lg:text-base mt-1 w-full text-center truncate">
                                Beach
                            </span>
                        </button>
                    </div>
                    <button class="carousel-arrow hidden sm:flex" id="carousel-next" aria-label="Next">&rarr;</button>
                </div>
            </div>
        </div>

        <!-- Game Loading Screen -->
        <div id="loading" class="screen">
            <div class="loader">Loading...</div>
        </div>

        <!-- Game Setup & Play Screen -->
        <div id="game-screen" class="screen flex flex-col md:flex-row h-full">
            <!-- Sidebar for Target Objects -->
            <aside id="sidebar" class="flex flex-col gap-1 w-full md:w-80 md:max-w-xs bg-white shadow-md z-10 px-3 py-2">
                <h2 data-i18n="findThese"
                    class="font-heading text-primary-color text-base md:text-2xl font-bold mb-1 text-left">
                    Find These!
                </h2>
                <div id="target-list"
                    class="target-grid flex md:grid md:grid-cols-2 gap-2 overflow-x-auto md:overflow-y-auto">
                    <!-- Populated dynamically by JS -->
                </div>
                <div class="sidebar-controls flex items-center justify-between gap-2 mt-2 border-t pt-2">
                    <div id="progress-text"
                        class="font-heading text-primary-color text-sm md:text-lg text-left whitespace-nowrap">
                        0 / 15 <span data-i18n="found">Found</span>
                    </div>
                    <button id="back-to-menu-btn"
                        class="secondary-btn font-bold px-2 sm:px-3 py-2 text-xs sm:text-sm md:text-base max-w-[55%] text-center leading-snug"
                        data-i18n="backToMenu">Back to Menu</button>
                </div>
            </aside>

            <!-- Main Scene Area -->
            <main id="scene-container"
                class="flex-1 flex items-center justify-center bg-[#333333] relative overflow-hidden">
                <!-- Inner container handles scaling/aspect ratio of the scene -->
                <div id="scene-wrapper">
                    <img id="scene-image" src="" alt="Game Scene Background">
                    <!-- Hidden objects injected here by JS as absolutely positioned clickable divs or overlays -->
                    <div id="hitboxes"></div>
                </div>

                <!-- Confetti Canvas Overlay -->
                <canvas id="confetti-canvas"></canvas>
            </main>
        </div>

        <!-- Win/End Screen -->
        <div id="win-screen" class="screen overlay">
            <div
                class="win-content bg-white rounded-3xl shadow-xl max-w-md sm:max-w-lg w-full p-6 sm:p-8 text-center">
                <h2 data-i18n="winTitle"
                    class="font-heading text-2xl sm:text-3xl lg:text-4xl text-[var(--success-color)] mb-3">
                    You found them all!
                </h2>
                <p data-i18n="winSubtitle" class="text-sm sm:text-base lg:text-lg mb-6">
                    Great job finding all the hidden objects.
                </p>
                <div class="win-buttons flex gap-3 justify-center flex-wrap">
                    <button id="play-again-btn" class="primary-btn px-5 py-3 text-base sm:text-lg"
                        data-i18n="playAgain">Play Again</button>
                    <button id="win-menu-btn" class="secondary-btn px-5 py-3 text-base sm:text-lg"
                        data-i18n="mainMenu">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio synthesized via Web Audio API in main.js, so no static mp3 tags needed -->

    <script src="js/confetti.js?v=2"></script>

    <!-- Data Modules (Phase 2.5 Architecture) -->
    <script src="js/data/i18n-core.js"></script>
    <script src="js/data/scenes/scene-toyshop.js"></script>
    <script src="js/data/scenes/scene-kitchen.js"></script>
    <script src="js/data/scenes/scene-playground.js?v=3"></script>
    <script src="js/data/scenes/scene-beach.js"></script>

    <!-- Core Game Engine -->
    <script src="js/main.js?v=2"></script>
</body>

</html>
