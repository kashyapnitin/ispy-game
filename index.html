<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Spy Digital Game</title>
    <!-- Google Fonts for vibrant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <!-- Main Menu Screen -->
        <div id="main-menu" class="screen active">
            <!-- Language Selector Header -->
            <header class="app-header">
                <select id="lang-select" class="lang-dropdown">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="hi">हिन्दी</option>
                    <option value="zh">中文</option>
                </select>
            </header>

            <div class="menu-content">
                <h1 data-i18n="title">I Spy...</h1>
                <p data-i18n="subtitle">Can you find all the hidden objects?</p>
                <div class="scene-selection">
                    <button class="scene-btn" data-scene="toyshop">
                        <img src="assets/images/scenes/toyshop/scene_toyshop.jpg" alt="Toy Shop Scene"
                            onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%23ccc\'/><text x=\'50\' y=\'50\' dominant-baseline=\'middle\' text-anchor=\'middle\'>Image Needed</text></svg>'">
                        <span data-i18n="sceneToyshop">Toy Shop</span>
                    </button>
                    <button class="scene-btn" data-scene="kitchen">
                        <img src="assets/images/scenes/kitchen/scene_kitchen.jpg" alt="Kitchen Scene">
                        <span data-i18n="sceneKitchen">Kitchen</span>
                    </button>
                    <button class="scene-btn" data-scene="playground">
                        <img src="assets/images/scenes/playground/scene_playground.jpg" alt="Playground Scene">
                        <span data-i18n="scenePlayground">Playground</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Loading Screen -->
        <div id="loading" class="screen">
            <div class="loader">Loading...</div>
        </div>

        <!-- Game Setup & Play Screen -->
        <div id="game-screen" class="screen">
            <!-- Sidebar for Target Objects -->
            <aside id="sidebar">
                <h2 data-i18n="findThese">Find These!</h2>
                <div id="target-list" class="target-grid">
                    <!-- Populated dynamically by JS -->
                </div>
                <div class="sidebar-controls">
                    <div id="progress-text">0 / 15 <span data-i18n="found">Found</span></div>
                    <button id="back-to-menu-btn" class="secondary-btn" data-i18n="backToMenu">Back to Menu</button>
                </div>
            </aside>

            <!-- Main Scene Area -->
            <main id="scene-container">
                <!-- Inner container handles scaling/aspect ratio of the scene -->
                <div id="scene-wrapper">
                    <img id="scene-image" src="" alt="Game Scene Background">
                    <!-- Hidden objects injected here by JS as absolutely positioned clickable divs or overlays -->
                    <div id="hitboxes"></div>
                </div>

                <!-- Confetti Canvas Overlay -->
                <canvas id="confetti-canvas"></canvas>
            </main>
        </div>

        <!-- Win/End Screen -->
        <div id="win-screen" class="screen overlay">
            <div class="win-content">
                <h2 data-i18n="winTitle">You found them all!</h2>
                <p data-i18n="winSubtitle">Great job finding all the hidden objects.</p>
                <div class="win-buttons">
                    <button id="play-again-btn" class="primary-btn" data-i18n="playAgain">Play Again</button>
                    <button id="win-menu-btn" class="secondary-btn" data-i18n="mainMenu">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio synthesized via Web Audio API in main.js, so no static mp3 tags needed -->

    <script src="js/confetti.js?v=2"></script>

    <!-- Data Modules (Phase 2.5 Architecture) -->
    <script src="js/data/i18n-core.js"></script>
    <script src="js/data/scenes/scene-toyshop.js"></script>
    <script src="js/data/scenes/scene-kitchen.js"></script>
    <script src="js/data/scenes/scene-playground.js"></script>

    <!-- Core Game Engine -->
    <script src="js/main.js?v=2"></script>
</body>

</html>
